<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sidebar</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Custom sidebar styles */
        .sidebar {
            width: 250px;
            position: fixed;
            height: 100%;
            background-color: #343a40;
            padding-top: 20px;
        }

        .sidebar a {
            color: #fff;
            display: block;
            padding: 10px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #575d63;
        }

        .menu-text,
        .crew-text,
        .clients-text {
            margin-left: 10px;
        }

        .logout-menu {
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        .dropdown-menu {
            background-color: #343a40;
            border: none;
        }

        .dropdown-item {
            color: #fff;
        }

        .dropdown-item:hover {
            background-color: #575d63;
        }

        .dropdown-container {
            padding-left: 15px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <a href="#" class="logo">
            <i class='bx bx-code-alt'></i>
            <div class="logo-name"><span>DashAdmin</span></div>
        </a>
        <div class="menu-items">
            <ul class="side-menu">
                <li><a asp-controller="Home" asp-action="Index"><i class='bx bx-home'></i><span
                            class="menu-text">Home</span></a></li>
                <li><a asp-controller="Dashboard" asp-action="Index"><i class='bx bxs-dashboard'></i><span
                            class="menu-text">Dashboard</span></a></li>
                <li><a asp-controller="Schedule" asp-action="Index"><i class='bx bx-time-five'></i><span
                            class="menu-text">Schedule</span></a></li>
                <li><a asp-controller="Tasks" asp-action="Index"><i class='bx bx-task'></i><span
                            class="menu-text">Tasks</span></a></li>
                <li><a asp-controller="Members" asp-action="Index"><i class='bx bx-user'></i><span
                            class="menu-text">Clients</span></a></li>
                <li><a asp-controller="MembersCrew" asp-action="Index"><i class='bx bx-user'></i><span
                            class="menu-text">Team</span></a></li>
                <li><a asp-controller="Reports" asp-action="Index"><i class='bx bxs-report'></i><span
                            class="menu-text">Reports</span></a></li>

                <!-- Marketing Dropdown Menu -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="marketingDropdown" role="button"
                        data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <i class='bx bx-chat'></i><span class="menu-text">Marketing</span>
                    </a>
                    <div class="dropdown-menu" aria-labelledby="marketingDropdown">
                        <a class="dropdown-item" asp-controller="Communication" asp-action="Index">Overview</a>
                        <a class="dropdown-item" asp-controller="Campaigns" asp-action="Index">Campaigns</a>
                        <a class="dropdown-item" asp-controller="Analytics" asp-action="Index">Analytics</a>
                    </div>
                </li>

                <!-- New Dropdown Container -->
                <div class="dropdown-container">
                    <li><a asp-controller="Stock" asp-action="Index"><i class='bx bx-box'></i><span
                                class="crew-text">Stock</span></a></li>
                    <li><a asp-controller="StoreItems" asp-action="Index"><i class='bx bx-store'></i><span
                                class="clients-text">Store Items</span></a></li>
                    <li><a asp-controller="Orders" asp-action="Index"><i class='bx bx-cart'></i><span
                                class="clients-text">Orders</span></a></li>
                </div>

                <li><a asp-controller="Settings" asp-action="Index"><i class='bx bx-cog'></i><span
                            class="menu-text">Settings</span></a></li>
            </ul>
        </div>
        <ul class="side-menu logout-menu">
            <li><a href="#" class="logout"><i class='bx bx-log-out'></i><span class="menu-text">Logout</span></a></li>
        </ul>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
