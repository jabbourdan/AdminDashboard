<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Modern Login Page | AsmrProg</title>
</head>

<body>

    <div class="container" id="container">
        <div class="form-container sign-in">
            <form>
                <h1>SMS</h1>
                <p>You can send a message or create a campaign with SMS messages</p>
                <button>New SMS session</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-right">
                    <h1>What's App</h1>
                    <p>You can send a message or create a campaign with WhatsApp messages</p>
                    <button class="hidden" id="register">New WhatsApp session</button>

                    <!-- Table for displaying created sessions -->
                    
                </div>
            </div>
        </div>
        
    </div>
    <div class="table-container">
        <h2>Created Sessions</h2>
        <table>
            <thead>
                <tr>
                    <th>Session ID</th>
                    <th>Session Type</th>
                    <th>Date Created</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>WhatsApp</td>
                    <td>2024-05-30</td>
                    <td>Active</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>SMS</td>
                    <td>2024-06-01</td>
                    <td>Completed</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>

</html>
